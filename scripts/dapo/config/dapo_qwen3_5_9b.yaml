defaults:
  - dapo_trainer
  - _self_

data:
  train_files: ${oc.env:TRAIN_FILE}
  val_files: ${oc.env:TEST_FILE}
  prompt_key: prompt
  truncation: error
  max_prompt_length: 4096
  max_response_length: 12288 # 8192 + buffer 4096
  gen_batch_size: 1536
  train_batch_size: 512
  shuffle: true
  seed: 42

algorithm:
  adv_estimator: grpo
  use_kl_in_reward: false
  kl_ctrl:
    kl_coef: 0.0
  filter_groups:
    enable: true  # dapo
    max_num_gen_batches: 10
    metric: acc  # 参考 https://verl.readthedocs.io/en/latest/algo/dapo.html

actor_rollout_ref:
  model:
    path: Qwen/Qwen3.5-9B
    use_remove_padding: true
    enable_gradient_checkpointing: true

  actor:
    use_kl_loss: false
    kl_loss_coef: 0.0
    clip_ratio_low: 0.2
    clip_ratio_high: 0.28
    clip_ratio_c: 10.0
    use_dynamic_bsz: true
    ppo_max_token_len_per_gpu: 16384
    ppo_mini_batch_size: 32
    entropy_coeff: 0
    grad_clip: 1.0
    loss_agg_mode: token-mean
    ulysses_sequence_parallel_size: 8
    optim:
      lr: 1e-6
      lr_warmup_steps: 10
      weight_decay: 0.1
    fsdp_config:
      param_offload: true
      optimizer_offload: true
      fsdp_size: -1

  # 当use_kl_loss为false以及 use_kl_in_reward=false时，不开启
  ref:
    log_prob_use_dynamic_bsz: true
    log_prob_max_token_len_per_gpu: 16384
    ulysses_sequence_parallel_size: 8
    fsdp_config:
      param_offload: true

  rollout:
    name: vllm
    n: 16
    log_prob_use_dynamic_bsz: true
    log_prob_max_token_len_per_gpu: 16384
    gpu_memory_utilization: 0.80
    tensor_model_parallel_size: 4
    enable_chunked_prefill: true
    max_num_batched_tokens: 16384
    temperature: 1.0
    top_p: 1.0
    top_k: -1
    val_kwargs:
      temperature: 0.2
      top_p: 0.95
      top_k: -1
      do_sample: true
      n: 1

reward_model:
  reward_manager: dapo
  overlong_buffer:
    enable: true
    len: 4096
    penalty_factor: 1.0

trainer:
  logger: [console, wandb]
  project_name: DAPO
  experiment_name: DAPO-Qwen3.5-9B
  n_gpus_per_node: 2
  nnodes: 1
  val_before_train: true
  test_freq: 5
  save_freq: 5
  total_epochs: 1
  default_local_dir: verl_ckpts/${trainer.project_name}/${trainer.experiment_name}