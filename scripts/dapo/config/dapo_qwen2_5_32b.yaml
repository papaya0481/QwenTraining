defaults:
  - dapo_trainer
  - _self_

data:
  train_files: ${oc.env:TRAIN_FILE,${oc.env:HOME}/verl/data/dapo-math-17k.parquet}
  val_files: ${oc.env:TEST_FILE,${oc.env:HOME}/verl/data/aime-2024.parquet}
  prompt_key: prompt
  truncation: left
  max_prompt_length: 2048
  max_response_length: 20480
  gen_batch_size: 1536
  train_batch_size: 512

algorithm:
  adv_estimator: grpo
  use_kl_in_reward: false
  kl_ctrl:
    kl_coef: 0.0
  filter_groups:
    enable: true
    max_num_gen_batches: 10
    metric: acc

actor_rollout_ref:
  model:
    path: ${oc.env:MODEL_PATH,${oc.env:HOME}/verl/models/Qwen2.5-32B}
    use_remove_padding: true
    enable_gradient_checkpointing: true

  actor:
    use_kl_loss: false
    kl_loss_coef: 0.0
    clip_ratio_low: 0.2
    clip_ratio_high: 0.28
    clip_ratio_c: 10.0
    use_dynamic_bsz: true
    ppo_max_token_len_per_gpu: 22528
    ppo_mini_batch_size: 32
    entropy_coeff: 0
    grad_clip: 1.0
    loss_agg_mode: token-mean
    ulysses_sequence_parallel_size: 8
    optim:
      lr: 1e-6
      lr_warmup_steps: 10
      weight_decay: 0.1
    fsdp_config:
      param_offload: true
      optimizer_offload: true
      fsdp_size: -1

  ref:
    log_prob_use_dynamic_bsz: true
    log_prob_max_token_len_per_gpu: 22528
    ulysses_sequence_parallel_size: 8
    fsdp_config:
      param_offload: true

  rollout:
    name: vllm
    n: 16
    log_prob_use_dynamic_bsz: true
    log_prob_max_token_len_per_gpu: 22528
    gpu_memory_utilization: 0.80
    tensor_model_parallel_size: 4
    enable_chunked_prefill: true
    max_num_batched_tokens: 22528
    temperature: 1.0
    top_p: 1.0
    top_k: -1
    val_kwargs:
      temperature: 1.0
      top_p: 0.7
      top_k: -1
      do_sample: true
      n: 1

reward_model:
  reward_manager: dapo
  overlong_buffer:
    enable: true
    len: 4096
    penalty_factor: 1.0

trainer:
  logger: [console, wandb]
  project_name: DAPO
  experiment_name: DAPO-Qwen2.5-32B
  n_gpus_per_node: 8
  nnodes: ${oc.env:NNODES,16}
  val_before_train: true
  test_freq: 5
  save_freq: 5
  total_epochs: 1
  default_local_dir: ${oc.env:CKPTS_DIR,${oc.env:HOME}/verl/ckpts/${trainer.project_name}/${trainer.experiment_name}}
  resume_mode: auto