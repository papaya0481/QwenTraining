hydra:
  searchpath:
    - file://scripts/dapo/config
    - file://verl/trainer/config
    - file://verl/verl/trainer/config
    - pkg://verl.verl.trainer.config

defaults:
  - dapo_trainer
  - _self_

data:
  train_files: /data/wuli_error/WRX/QwenTraining/rl_data/train.parquet
  val_files: /data/wuli_error/WRX/QwenTraining/rl_data/test.parquet
  prompt_key: prompt
  truncation: error
  max_prompt_length: 4096
  max_response_length: 2560 # 8192 + buffer 2048
  filter_overlong_prompts: true
  gen_batch_size: 16
  train_batch_size: 4
  shuffle: true
  seed: 42
  apply_chat_template_kwargs:
    enable_thinking: true # 设置开启think

algorithm:
  adv_estimator: grpo
  use_kl_in_reward: false
  kl_ctrl:
    kl_coef: 0.0
  filter_groups:
    enable: true  # dapo
    max_num_gen_batches: 10
    metric: acc  # 参考 https://verl.readthedocs.io/en/latest/algo/dapo.html

# lora_adapter_path: 加载lora 权重
actor_rollout_ref:
  model:
    path: Qwen/Qwen3.5-0.8B
    lora_adapter_path: /data/wuli_error/WRX/QwenTraining/output/v52-20260404-111420/checkpoint-1
    use_remove_padding: true
    enable_gradient_checkpointing: true
    override_config:
      dtype: bfloat16 

  actor:
    use_kl_loss: false
    kl_loss_coef: 0.0
    clip_ratio_low: 0.2
    clip_ratio_high: 0.28
    clip_ratio_c: 10.0
    use_dynamic_bsz: true
    ppo_max_token_len_per_gpu: 2560
    ppo_mini_batch_size: 32
    entropy_coeff: 0
    grad_clip: 1.0
    loss_agg_mode: token-mean
    ulysses_sequence_parallel_size: 1
    optim:
      lr: 1e-6
      lr_warmup_steps: 10
      weight_decay: 0.1
    fsdp_config:
      param_offload: true
      optimizer_offload: true
      fsdp_size: -1
      model_dtype: bfloat16

  # 当use_kl_loss为false以及 use_kl_in_reward=false时，不开启
  ref:
    log_prob_use_dynamic_bsz: true
    log_prob_max_token_len_per_gpu: 16384
    ulysses_sequence_parallel_size: 1
    fsdp_config:
      param_offload: true

  rollout:
    trace: # 添加查看val data的回答
      backend: weave
      token2text: true  # 能够查看生成的text
      max_samples_per_step_per_worker: 3
    name: vllm
    n: 16
    dtype: bfloat16
    log_prob_use_dynamic_bsz: true
    log_prob_micro_batch_size_per_gpu: 16
    log_prob_max_token_len_per_gpu: 2560
    gpu_memory_utilization: 0.5
    tensor_model_parallel_size: 1
    enable_chunked_prefill: true
    max_num_batched_tokens: 2560
    max_model_len: 2560
    temperature: 1.0
    top_p: 1.0
    top_k: -1
    val_kwargs:
      temperature: 0.2
      top_p: 0.95
      top_k: -1
      do_sample: true
      n: 1

reward_model:
  reward_manager: dapo
  reward_kwargs:
    max_resp_len: 2560  # 必须加这个，对应你 data.max_response_length
    overlong_buffer_cfg: # 注意这里可能需要带上 _cfg 后缀，视 verl 版本而定
      enable: true
      len: 512
      penalty_factor: 1.0
      log: true

reward:
  custom_reward_function:
    path: /data/wuli_error/WRX/QwenTraining/scripts/plugins/verl_codegen1_reward.py
    name: compute_score
    reward_kwargs:
      timeout_sec: 8
      memory_limit_mb: 1024

trainer:
  # logger: ['console', 'wandb']
  logger: ['console']
  project_name: DAPO
  experiment_name: DAPO-Qwen3.5-0.8B
  n_gpus_per_node: 1
  nnodes: 1
  val_before_train: true
  test_freq: 5
  save_freq: 5
  total_epochs: 1
  total_training_steps: 20
  default_local_dir: verl_ckpts/${trainer.project_name}/${trainer.experiment_name}