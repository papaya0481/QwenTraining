hydra:
  searchpath:
    - file://scripts/dapo/config
    - file://verl/trainer/config
    - file://verl/verl/trainer/config
    - pkg://verl.verl.trainer.config

defaults:
  - dapo_trainer
  - _self_

data:
  train_files: /data/wuli_error/WRX/QwenTraining/rl_data/train.parquet
  val_files: /data/wuli_error/WRX/QwenTraining/rl_data/test.parquet
  prompt_key: prompt
  truncation: error
  max_prompt_length: 5000
  max_response_length: 2000
  filter_overlong_prompts: true
  gen_batch_size: 4
  train_batch_size: 2
  shuffle: false
  seed: 42
  apply_chat_template_kwargs:
    enable_thinking: true # 设置开启think

algorithm:
  adv_estimator: grpo
  norm_adv_by_std_in_grpo: false
  use_kl_in_reward: false
  kl_ctrl:
    kl_coef: 0.0
  filter_groups:
    enable: false
    max_num_gen_batches: 8
    metric: acc  # 参考 https://verl.readthedocs.io/en/latest/algo/dapo.html

# lora_adapter_path: 加载lora 权重
actor_rollout_ref:
  model:
    path: ${oc.env:MODEL_PATH,Qwen/Qwen3.5-0.8B}
    lora_adapter_path: ${oc.env:SFT_ADAPTER_PATH,}
    # lora_adapter_path: /data/wuli_error/WRX/QwenTraining/output/v52-20260404-111420/checkpoint-1
    use_remove_padding: true
    enable_gradient_checkpointing: true
    lora:
      merge: false
    override_config:
      dtype: bfloat16
      attn_implementation: eager # eager  / flash_attention_2

  actor:
    use_kl_loss: false
    kl_loss_coef: 0.0
    clip_ratio_low: 0.2
    clip_ratio_high: 0.28
    ppo_mini_batch_size: 1
    ppo_micro_batch_size_per_gpu: 1
    entropy_coeff: 0
    loss_agg_mode: token-mean
    kl_loss_type: low_var_kl
    optim:
      lr: 5e-7
    fsdp_config:
      param_offload: false
      optimizer_offload: false
      fsdp_size: -1
      model_dtype: bfloat16
    checkpoint:
      save_contents: ['optimizer', 'extra'] # 节省空间

  # 当use_kl_loss为false以及 use_kl_in_reward=false时，不开启
  ref:
    model:
      override_config:
        attn_implementation: eager
    log_prob_micro_batch_size_per_gpu: 1
    fsdp_config:
      param_offload: false

  rollout:
    # trace: # 添加查看val data的回答
    #   backend: None
    #   token2text: true  # 能够查看生成的text
    #   max_samples_per_step_per_worker: 3
    name: vllm
    enforce_eager: true
    load_format: safetensors
    agent:
      num_workers: 1
    n: 2
    log_prob_micro_batch_size_per_gpu: 1
    gpu_memory_utilization: 0.4
    tensor_model_parallel_size: 1
    max_num_seqs: 64
    max_num_batched_tokens: 1024
    max_model_len: 8192
    temperature: 1.0
    top_p: 1.0
    top_k: -1
    val_kwargs:
      temperature: 0.2
      top_p: 0.95
      top_k: -1
      do_sample: true
      n: 1

reward:
  reward_manager:
    name: dapo
  num_workers: 1
  reward_kwargs:
    max_resp_len: 2000
    overlong_buffer_cfg:
      enable: true
      len: 1024
      penalty_factor: 1.0
      log: false
  custom_reward_function:
    path: /data/wuli_error/WRX/QwenTraining/scripts/plugins/verl_codegen1_reward.py
    name: compute_score
    reward_kwargs:
      timeout_sec: 4
      memory_limit_mb: 1024

trainer:
  # logger: ['console', 'wandb']
  logger: ['console']
  project_name: DAPO
  experiment_name: DAPO-Qwen3.5-0.8B
  n_gpus_per_node: 1
  nnodes: 1
  val_before_train: false
  max_ckpt_to_keep: 3
  test_freq: 1
  save_freq: 1
  total_epochs: 1
  total_training_steps: 20
  default_local_dir: ${oc.env:OUTPUT_DIR,./outputs/verl/${trainer.project_name}/${trainer.experiment_name}}